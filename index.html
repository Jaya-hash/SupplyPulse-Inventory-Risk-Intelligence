<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareGuide — CareIQ</title>
<style>
  :root{
    --ink:#0F2A2E;
    --teal:#0E5C5B;
    --teal-deep:#083B3A;
    --coral:#FF6B4A;
    --sand:#FBF7F1;
    --line:#D8E6E4;
    --white:#FFFFFF;
    --muted:#5C7A78;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Calibri,Arial,sans-serif;
    background:var(--sand);
    color:var(--ink);
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    background:var(--white);
    display:flex;
    flex-direction:column;
    box-shadow:0 0 40px rgba(15,42,46,0.08);
  }
  header{
    background:var(--teal-deep);
    color:var(--white);
    padding:18px 20px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark{
    width:34px;height:34px;border-radius:10px;
    background:var(--coral);
    display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:16px;color:white;
  }
  .brand-text h1{margin:0;font-size:16px;letter-spacing:.2px;}
  .brand-text span{font-size:11px;color:#9FCFCC;}
  select#lang{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    color:white;
    border-radius:8px;
    padding:6px 8px;
    font-size:12px;
  }
  .chat{
    flex:1;
    padding:18px 16px 8px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .msg{
    max-width:84%;
    padding:11px 14px;
    border-radius:14px;
    font-size:14px;
    line-height:1.45;
  }
  .msg.bot{
    align-self:flex-start;
    background:#EFF6F5;
    border:1px solid var(--line);
    border-bottom-left-radius:4px;
  }
  .msg.user{
    align-self:flex-end;
    background:var(--teal);
    color:white;
    border-bottom-right-radius:4px;
  }
  .card{
    align-self:flex-start;
    max-width:90%;
    background:var(--white);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    font-size:13.5px;
  }
  .card h3{
    margin:0 0 8px;
    font-size:14px;
    color:var(--teal-deep);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .confidence{
    display:inline-block;
    font-size:11px;
    background:#E8F4E3;
    color:#2F7A3D;
    border-radius:20px;
    padding:2px 8px;
    margin-left:6px;
    font-weight:600;
  }
  .clinic{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:9px 0;
    border-top:1px solid var(--line);
  }
  .clinic:first-of-type{border-top:none;}
  .clinic .name{font-weight:600;font-size:13.5px;}
  .clinic .meta{color:var(--muted);font-size:12px;}
  .wait{
    font-size:11.5px;
    font-weight:700;
    padding:3px 8px;
    border-radius:20px;
  }
  .wait.low{background:#E8F4E3;color:#2F7A3D;}
  .wait.med{background:#FFF1DE;color:#A85B00;}
  .book-btn{
    margin-top:10px;
    width:100%;
    background:var(--coral);
    color:white;
    border:none;
    border-radius:10px;
    padding:10px;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
  }
  .book-btn:hover{background:#E85B3D;}
  .trust{
    font-size:11px;
    color:var(--muted);
    margin-top:8px;
    padding-top:8px;
    border-top:1px dashed var(--line);
  }
  .quick-replies{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:0 16px 12px;
  }
  .qr{
    background:var(--white);
    border:1px solid var(--teal);
    color:var(--teal-deep);
    border-radius:20px;
    padding:7px 13px;
    font-size:12.5px;
    cursor:pointer;
  }
  .qr:hover{background:#EFF6F5;}
  .inputbar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:12px 16px 18px;
    border-top:1px solid var(--line);
    background:var(--white);
  }
  .inputbar input{
    flex:1;
    border:1px solid var(--line);
    border-radius:22px;
    padding:11px 16px;
    font-size:14px;
    outline:none;
  }
  .inputbar input:focus{border-color:var(--teal);}
  .round-btn{
    width:42px;height:42px;
    border-radius:50%;
    border:none;
    background:var(--teal);
    color:white;
    font-size:17px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .round-btn.mic{background:var(--coral);}
  .round-btn:hover{opacity:.9;}
  .typing{
    align-self:flex-start;
    display:flex;
    gap:4px;
    padding:11px 14px;
    background:#EFF6F5;
    border-radius:14px;
  }
  .typing span{
    width:6px;height:6px;border-radius:50%;
    background:var(--muted);
    animation:bounce 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}
  .toast{
    position:fixed;
    bottom:24px;left:50%;
    transform:translateX(-50%);
    background:var(--teal-deep);
    color:white;
    padding:10px 18px;
    border-radius:24px;
    font-size:13px;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);
    opacity:0;
    transition:opacity .3s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
  .chat::-webkit-scrollbar{width:5px;}
  .chat::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="brand-mark">C</div>
      <div class="brand-text">
        <h1>CareGuide</h1>
        <span>by CareIQ · powered by Gemini (simulated)</span>
      </div>
    </div>
    <select id="lang">
      <option value="en">English</option>
      <option value="hi">हिन्दी</option>
      <option value="es">Español</option>
      <option value="fr">Français</option>
    </select>
  </header>

  <div class="chat" id="chat"></div>
  <div class="quick-replies" id="quickReplies"></div>

  <div class="inputbar">
    <button class="round-btn mic" id="micBtn" title="Voice input">🎤</button>
    <input id="textInput" type="text" placeholder="Describe how you're feeling…" />
    <button class="round-btn" id="sendBtn" title="Send">➤</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const i18n = {
  en: {
    greet: "Hi, I'm CareGuide. Tell me what's going on — you can type, or tap the mic to speak.",
    quick: ["Fever & headache","Stomach pain","Cough & cold","Find a clinic"],
    thinking: "",
    placeholder: "Describe how you're feeling…",
    book: "Book appointment",
    booked: "Appointment requested — the clinic will confirm shortly.",
    triageHeader: "Possible cause",
    clinicHeader: "Nearby clinics",
    trust: "This is a guided suggestion, not a diagnosis. Confidence shown is based on symptom pattern match against verified medical sources.",
    low: "short wait", med: "moderate wait"
  },
  hi: {
    greet: "नमस्ते, मैं CareGuide हूँ। बताएं आपको क्या हो रहा है — टाइप करें या माइक दबाकर बोलें।",
    quick: ["बुखार और सिरदर्द","पेट दर्द","खांसी और जुकाम","क्लिनिक खोजें"],
    placeholder: "आप कैसा महसूस कर रहे हैं बताएं…",
    book: "अपॉइंटमेंट बुक करें",
    booked: "अपॉइंटमेंट का अनुरोध भेजा गया — क्लिनिक शीघ्र पुष्टि करेगा।",
    triageHeader: "संभावित कारण",
    clinicHeader: "नज़दीकी क्लिनिक",
    trust: "यह एक सुझाव है, निदान नहीं। विश्वास स्तर सत्यापित मेडिकल स्रोतों पर आधारित है।",
    low: "कम प्रतीक्षा", med: "मध्यम प्रतीक्षा"
  },
  es: {
    greet: "Hola, soy CareGuide. Cuéntame qué sientes — puedes escribir o tocar el micrófono.",
    quick: ["Fiebre y dolor de cabeza","Dolor de estómago","Tos y resfriado","Buscar clínica"],
    placeholder: "Describe cómo te sientes…",
    book: "Reservar cita",
    booked: "Cita solicitada — la clínica confirmará en breve.",
    triageHeader: "Posible causa",
    clinicHeader: "Clínicas cercanas",
    trust: "Esto es una sugerencia guiada, no un diagnóstico.",
    low: "espera corta", med: "espera moderada"
  },
  fr: {
    greet: "Bonjour, je suis CareGuide. Dites-moi ce qui se passe — tapez ou parlez avec le micro.",
    quick: ["Fièvre et mal de tête","Douleur à l'estomac","Toux et grippe","Trouver une clinique"],
    placeholder: "Décrivez ce que vous ressentez…",
    book: "Prendre rendez-vous",
    booked: "Rendez-vous demandé — la clinique confirmera bientôt.",
    triageHeader: "Cause possible",
    clinicHeader: "Cliniques proches",
    trust: "Ceci est une suggestion, pas un diagnostic.",
    low: "attente courte", med: "attente modérée"
  }
};

let lang = "en";
const chat = document.getElementById('chat');
const quickWrap = document.getElementById('quickReplies');
const input = document.getElementById('textInput');

function t(){ return i18n[lang]; }

function addMsg(text, who){
  const d = document.createElement('div');
  d.className = 'msg ' + who;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(cb){
  const d = document.createElement('div');
  d.className = 'typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  setTimeout(()=>{ d.remove(); cb(); }, 900);
}

function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2600);
}

const clinicData = [
  {name:"Riverside Community Clinic", dist:"0.8 km", wait:"12 min", level:"low"},
  {name:"St. Anne's Urgent Care", dist:"1.4 km", wait:"25 min", level:"med"},
  {name:"Sunridge Family Health", dist:"2.1 km", wait:"9 min", level:"low"}
];

const triageRules = [
  { keys:["fever","headache","बुखार","सिरदर्द","fiebre","fièvre"], cause:"Likely viral infection (e.g. flu)", confidence:87 },
  { keys:["stomach","पेट","estómago","estomac"], cause:"Possible gastritis or mild food-related issue", confidence:79 },
  { keys:["cough","cold","खांसी","tos","toux"], cause:"Likely common cold or seasonal allergy", confidence:83 }
];

function matchTriage(text){
  const lower = text.toLowerCase();
  for(const rule of triageRules){
    if(rule.keys.some(k=>lower.includes(k.toLowerCase()))) return rule;
  }
  return { cause: "General discomfort — recommend a check-up to be sure", confidence:64 };
}

function renderTriageCard(result){
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <h3>🩺 ${t().triageHeader} <span class="confidence">${result.confidence}% confidence</span></h3>
    <div>${result.cause}</div>
    <div class="trust">${t().trust}</div>
  `;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;
}

function renderClinicCard(){
  const card = document.createElement('div');
  card.className = 'card';
  let rows = clinicData.map(c => `
    <div class="clinic">
      <div>
        <div class="name">${c.name}</div>
        <div class="meta">${c.dist} away</div>
      </div>
      <div class="wait ${c.level}">${c.wait}</div>
    </div>
  `).join('');
  card.innerHTML = `<h3>📍 ${t().clinicHeader}</h3>${rows}
    <button class="book-btn" id="bookBtn">${t().book} — ${clinicData[0].name}</button>`;
  chat.appendChild(card);
  chat.scrollTop = chat.scrollHeight;
  document.getElementById('bookBtn').onclick = () => toast(t().booked);
}

function botRespond(userText){
  showTyping(() => {
    const result = matchTriage(userText);
    renderTriageCard(result);
    setTimeout(()=> showTyping(renderClinicCard), 400);
  });
}

function handleSend(){
  const val = input.value.trim();
  if(!val) return;
  addMsg(val, 'user');
  input.value = '';
  botRespond(val);
}

document.getElementById('sendBtn').onclick = handleSend;
input.addEventListener('keydown', e => { if(e.key === 'Enter') handleSend(); });

document.getElementById('micBtn').onclick = () => {
  toast(lang === 'hi' ? "सुन रहा हूँ…" : "Listening…");
  setTimeout(() => {
    const sample = lang === 'hi' ? "मुझे बुखार और सिरदर्द है" : "I have a fever and headache";
    input.value = sample;
    handleSend();
  }, 1200);
};

function renderQuickReplies(){
  quickWrap.innerHTML = '';
  t().quick.forEach(q => {
    const b = document.createElement('button');
    b.className = 'qr';
    b.textContent = q;
    b.onclick = () => {
      if(q === t().quick[3]){
        addMsg(q, 'user');
        showTyping(renderClinicCard);
      } else {
        addMsg(q, 'user');
        botRespond(q);
      }
    };
    quickWrap.appendChild(b);
  });
}

function boot(){
  chat.innerHTML = '';
  addMsg(t().greet, 'bot');
  renderQuickReplies();
  input.placeholder = t().placeholder;
}

document.getElementById('lang').addEventListener('change', e => {
  lang = e.target.value;
  boot();
});

boot();
</script>
</body>
</html>
